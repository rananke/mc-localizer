name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller requests
      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name "MCLocalizer" mc_localizer_gui.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCLocalizer
          path: dist/MCLocalizer.exe
